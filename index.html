<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elseora</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      opacity: 1;
      transform: scale(1);
      transition: opacity 0.8s ease, transform 0.8s ease;
      background:
        radial-gradient(circle at 20% 30%, rgba(82, 96, 180, 0.18), transparent 22%),
        radial-gradient(circle at 80% 20%, rgba(133, 74, 170, 0.12), transparent 20%),
        radial-gradient(circle at 60% 75%, rgba(64, 118, 170, 0.10), transparent 24%),
        radial-gradient(circle at center, #050814 0%, #02040a 45%, #000 100%);
    }

    body.fade-out {
      opacity: 0;
      transform: scale(1.05);
    }

    .wrap {
      text-align: center;
      padding: 24px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 52px;
      margin: 0 0 16px;
      letter-spacing: 1px;
    }

    p {
      margin: 0 0 32px;
      color: #cfcfcf;
      font-size: 18px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      padding: 16px 28px;
      font-size: 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.03);
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(2px);
      transition: background 0.25s ease, transform 0.25s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.10);
      transform: translateY(-1px);
    }

    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: white;
      animation-name: driftUp, twinkle;
      animation-timing-function: linear, ease-in-out;
      animation-iteration-count: infinite, infinite;
    }

    .star.layer1 {
      width: 1px;
      height: 1px;
      opacity: 0.35;
      box-shadow: 0 0 4px rgba(255,255,255,0.35);
    }

    .star.layer2 {
      width: 2px;
      height: 2px;
      opacity: 0.6;
      box-shadow: 0 0 8px rgba(255,255,255,0.5);
    }

    .star.layer3 {
      width: 3px;
      height: 3px;
      opacity: 0.9;
      box-shadow: 0 0 12px rgba(180,210,255,0.9);
    }

    @keyframes driftUp {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-1200px);
      }
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.25;
      }
      50% {
        opacity: 1;
      }
    }

    .sound-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 2;
      background: transparent;
      color: white;
      border: 1px solid white;
      padding: 10px 16px;
      border-radius: 20px;
      cursor: pointer;
    }

    .shooting-star {
      position: fixed;
      top: -10%;
      left: -10%;
      width: 2px;
      height: 2px;
      background: white;
      box-shadow: 0 0 6px rgba(255,255,255,0.8),
                  0 0 20px rgba(180,210,255,0.6);
      opacity: 0;
      transform: rotate(45deg);
      z-index: 2;
      pointer-events: none;
    }

    .shooting-star::after {
      content: "";
      position: absolute;
      top: 0;
      left: -60px;
      width: 60px;
      height: 2px;
      background: linear-gradient(to left, white, transparent);
      opacity: 0.6;
    }

    @keyframes shoot {
      0% {
        opacity: 0;
        transform: translate(0, 0) rotate(45deg);
      }
      10% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate(600px, 600px) rotate(45deg);
      }
    }

    .loading-note {
      position: fixed;
      left: 50%;
      bottom: 80px;
      transform: translateX(-50%);
      z-index: 3;
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.06);
      padding: 8px 12px;
      border-radius: 999px;
      backdrop-filter: blur(4px);
      display: none;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 42px;
      }

      p {
        font-size: 16px;
      }

      button {
        width: 100%;
        max-width: 320px;
      }

      .buttons {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div id="shooting-star" class="shooting-star"></div>

  <div class="wrap">
    <h1>Elseora</h1>
    <p>where distance disappears</p>

    <div class="buttons">
      <button onclick="escapeEarth()">ESCAPE EARTH</button>
      <button onclick="escapeCosmos()">ESCAPE COSMOS</button>
    </div>
  </div>

  <div class="loading-note" id="loadingNote">Searching the portal...</div>

  <audio id="bgm" loop>
    <source src="the_mountain-space-438391.mp3" type="audio/mpeg">
  </audio>

  <button class="sound-btn" onclick="toggleSound()" id="soundBtn">sound off</button>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbz5-SlB4FVf-6Qrx06UFqL24zx8uNKFSB4IgmDrAm9SGgts2DRONVp6DgBXN_NvzLPj/exec
";

    const starsContainer = document.getElementById("stars");
    const shootingStar = document.getElementById("shooting-star");
    const audio = document.getElementById("bgm");
    const soundBtn = document.getElementById("soundBtn");
    const loadingNote = document.getElementById("loadingNote");

    let isPlaying = false;
    let scenesCache = null;

    function createStars(count, layerName, minDrift, maxDrift, minTwinkle, maxTwinkle) {
      for (let i = 0; i < count; i++) {
        const star = document.createElement("div");
        star.className = `star ${layerName}`;

        star.style.left = Math.random() * 100 + "vw";
        star.style.top = Math.random() * 100 + "vh";

        const drift = (minDrift + Math.random() * (maxDrift - minDrift)).toFixed(2);
        const twinkle = (minTwinkle + Math.random() * (maxTwinkle - minTwinkle)).toFixed(2);

        star.style.animationDuration = `${drift}s, ${twinkle}s`;
        star.style.animationDelay = `${Math.random() * 10}s, ${Math.random() * 5}s`;

        starsContainer.appendChild(star);
      }
    }

    createStars(90, "layer1", 80, 130, 5, 9);
    createStars(55, "layer2", 45, 80, 3, 6);
    createStars(20, "layer3", 25, 45, 2, 4);

    function toggleSound() {
      if (!isPlaying) {
        audio.play();
        isPlaying = true;
        soundBtn.textContent = "sound on";
      } else {
        audio.pause();
        isPlaying = false;
        soundBtn.textContent = "sound off";
      }
    }

    function triggerShootingStar() {
      const startX = Math.random() * window.innerWidth;
      const startY = Math.random() * window.innerHeight * 0.3;

      shootingStar.style.left = startX + "px";
      shootingStar.style.top = startY + "px";

      shootingStar.style.animation = "none";
      shootingStar.offsetHeight;
      shootingStar.style.animation = "shoot 1.2s ease-out";
    }

    function scheduleShootingStar() {
      const delay = 20000 + Math.random() * 10000;
      setTimeout(() => {
        triggerShootingStar();
        scheduleShootingStar();
      }, delay);
    }

    scheduleShootingStar();

    async function fetchScenes() {
      if (scenesCache) return scenesCache;

      const res = await fetch(API_URL);
      if (!res.ok) {
        throw new Error("Failed to fetch scenes");
      }

      const data = await res.json();

      scenesCache = data.map(item => ({
        active: String(item.active || "").trim().toLowerCase(),
        type: String(item.type || "").trim().toLowerCase(),
        scene_id: String(item.scene_id || "").trim(),
        title: String(item.title || "").trim(),
        subtitle: String(item.subtitle || "").trim(),
        background_url: String(item.background_url || "").trim(),
        product_name: String(item.product_name || "").trim(),
        product_link: String(item.product_link || "").trim(),
        product_image: String(item.product_image || "").trim(),
        weight: parseInt(item.weight, 10) || 1
      }));

      return scenesCache;
    }

    function weightedPick(items) {
      const expanded = [];

      items.forEach(item => {
        const weight = Math.max(1, item.weight || 1);
        for (let i = 0; i < weight; i++) {
          expanded.push(item);
        }
      });

      return expanded[Math.floor(Math.random() * expanded.length)];
    }

    function transitionAndGo(url) {
      loadingNote.style.display = "block";
      document.body.classList.add("fade-out");

      setTimeout(() => {
        window.location.href = url;
      }, 800);
    }

    async function escapeEarth() {
      try {
        const scenes = await fetchScenes();
        const earthScenes = scenes.filter(
          item => item.active === "yes" && item.type === "earth" && item.scene_id
        );

        if (!earthScenes.length) {
          alert("No Earth scenes found.");
          return;
        }

        const selected = weightedPick(earthScenes);
        transitionAndGo(`scene.html?id=${encodeURIComponent(selected.scene_id)}`);
      } catch (error) {
        console.error(error);
        alert("Unable to load Earth scenes.");
      }
    }

    async function escapeCosmos() {
      try {
        const scenes = await fetchScenes();
        const cosmosScenes = scenes.filter(
          item => item.active === "yes" && item.type === "cosmos" && item.scene_id
        );

        if (!cosmosScenes.length) {
          alert("No Cosmos scenes found.");
          return;
        }

        const selected = weightedPick(cosmosScenes);
        transitionAndGo(`scene.html?id=${encodeURIComponent(selected.scene_id)}`);
      } catch (error) {
        console.error(error);
        alert("Unable to load Cosmos scenes.");
      }
    }
  </script>
</body>
</html>
