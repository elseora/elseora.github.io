<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elseora</title>
  <style>
    html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  background:
    radial-gradient(circle at 20% 30%, rgba(82, 96, 180, 0.18), transparent 22%),
    radial-gradient(circle at 80% 20%, rgba(133, 74, 170, 0.12), transparent 20%),
    radial-gradient(circle at 60% 75%, rgba(64, 118, 170, 0.10), transparent 24%),
    radial-gradient(circle at center, #050814 0%, #02040a 45%, #000 100%);
}

.wrap {
  text-align: center;
  padding: 24px;
  position: relative;
  z-index: 2;
}

h1 {
  font-size: 52px;
  margin: 0 0 16px;
  letter-spacing: 1px;
}

p {
  margin: 0 0 32px;
  color: #cfcfcf;
  font-size: 18px;
}

.buttons {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

button {
  padding: 16px 28px;
  font-size: 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.7);
  background: rgba(255,255,255,0.03);
  color: #fff;
  cursor: pointer;
  backdrop-filter: blur(2px);
}

button:hover {
  background: rgba(255,255,255,0.10);
}

.stars {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation-name: driftUp, twinkle;
  animation-timing-function: linear, ease-in-out;
  animation-iteration-count: infinite, infinite;
}

.star.layer1 {
  width: 1px;
  height: 1px;
  opacity: 0.35;
  box-shadow: 0 0 4px rgba(255,255,255,0.35);
}

.star.layer2 {
  width: 2px;
  height: 2px;
  opacity: 0.6;
  box-shadow: 0 0 8px rgba(255,255,255,0.5);
}

.star.layer3 {
  width: 3px;
  height: 3px;
  opacity: 0.9;
  box-shadow: 0 0 12px rgba(180,210,255,0.9);
}

@keyframes driftUp {
  from {
    transform: translateY(0);
  }
  to {
    transform: translateY(-1200px);
  }
}

@keyframes twinkle {
  0%, 100% {
    opacity: 0.25;
  }
  50% {
    opacity: 1;
  }
}

.sound-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 2;
  background: transparent;
  color: white;
  border: 1px solid white;
  padding: 10px 16px;
  border-radius: 20px;
  cursor: pointer;
}

    .shooting-star {
  position: fixed;
  top: -10%;
  left: -10%;
  width: 2px;
  height: 2px;
  background: white;
  box-shadow: 0 0 6px rgba(255,255,255,0.8),
              0 0 20px rgba(180,210,255,0.6);
  opacity: 0;
  transform: rotate(45deg);
  z-index: 2;
}

.shooting-star::after {
  content: "";
  position: absolute;
  top: 0;
  left: -60px;
  width: 60px;
  height: 2px;
  background: linear-gradient(to left, white, transparent);
  opacity: 0.6;
}

@keyframes shoot {
  0% {
    opacity: 0;
    transform: translate(0, 0) rotate(45deg);
  }
  10% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translate(600px, 600px) rotate(45deg);
  }
}
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div id="shooting-star" class="shooting-star"></div>

  <div class="wrap">
    <h1>Elseora</h1>
    <p>where distance disappears</p>

    <div class="buttons">
      <button onclick="escapeEarth()">ESCAPE EARTH</button>
      <button onclick="escapeCosmos()">ESCAPE COSMOS</button>
    </div>
  </div>

  <audio id="bgm" loop>
    <source src="the_mountain-space-438391.mp3" type="audio/mpeg">
  </audio>

  <button class="sound-btn" onclick="toggleSound()" id="soundBtn">sound off</button>

  <script>
    const starsContainer = document.getElementById("stars");

function createStars(count, layerName, minDrift, maxDrift, minTwinkle, maxTwinkle) {
  for (let i = 0; i < count; i++) {
    const star = document.createElement("div");
    star.className = `star ${layerName}`;

    star.style.left = Math.random() * 100 + "vw";
    star.style.top = Math.random() * 100 + "vh";

    const drift = (minDrift + Math.random() * (maxDrift - minDrift)).toFixed(2);
    const twinkle = (minTwinkle + Math.random() * (maxTwinkle - minTwinkle)).toFixed(2);

    star.style.animationDuration = `${drift}s, ${twinkle}s`;
    star.style.animationDelay = `${Math.random() * 10}s, ${Math.random() * 5}s`;

    starsContainer.appendChild(star);
  }
}

createStars(90, "layer1", 80, 130, 5, 9);
createStars(55, "layer2", 45, 80, 3, 6);
createStars(20, "layer3", 25, 45, 2, 4);

    function transitionAndGo(url) {
      document.body.style.transition = "all 0.8s ease";
      document.body.style.opacity = "0";
      document.body.style.transform = "scale(1.05)";

      setTimeout(() => {
        window.open(url, "_blank");
        document.body.style.opacity = "1";
        document.body.style.transform = "scale(1)";
      }, 800);
    }

    function escapeEarth() {
      const earthPlaces = [
        "https://earth.google.com/web/",
        "https://www.google.com/maps/@27.9881,86.9250,3a,75y,90t/data=!3m8!1e1",
        "https://www.google.com/maps/@35.3606,138.7274,3a,75y,90t/data=!3m8!1e1"
      ];
      const random = earthPlaces[Math.floor(Math.random() * earthPlaces.length)];
      transitionAndGo(random);
    }

    function escapeCosmos() {
      const cosmosPlaces = [
        "https://eyes.nasa.gov/apps/solar-system/#/home",
        "https://www.google.com/sky/",
        "https://science.nasa.gov/universe/"
      ];
      const random = cosmosPlaces[Math.floor(Math.random() * cosmosPlaces.length)];
      transitionAndGo(random);
    }

    let isPlaying = false;
const audio = document.getElementById("bgm");
const soundBtn = document.getElementById("soundBtn");

function toggleSound() {
  if (!isPlaying) {
    audio.play();
    isPlaying = true;
    soundBtn.textContent = "sound on";
  } else {
    audio.pause();
    isPlaying = false;
    soundBtn.textContent = "sound off";
  }
}
    const shootingStar = document.getElementById("shooting-star");

function triggerShootingStar() {
  const startX = Math.random() * window.innerWidth;
  const startY = Math.random() * window.innerHeight * 0.3;

  shootingStar.style.left = startX + "px";
  shootingStar.style.top = startY + "px";

  shootingStar.style.animation = "none";
  shootingStar.offsetHeight; // 強制刷新

  shootingStar.style.animation = "shoot 1.2s ease-out";
}

// 每 20~30 秒出現一次（更自然）
function scheduleShootingStar() {
  const delay = 20000 + Math.random() * 10000;
  setTimeout(() => {
    triggerShootingStar();
    scheduleShootingStar();
  }, delay);
}

scheduleShootingStar();
  </script>
</body>
</html>
